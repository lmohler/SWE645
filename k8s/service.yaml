# service.yaml
# Author: Lucas Mohler
# Purpose: Kubernetes Service manifest that exposes the SWE 645 web application
#          externally via NodePort 30007, routing traffic to the nginx pods on port 80.

apiVersion: v1
kind: Service
metadata:
  name: my-webapp-service
spec:
  selector:
    app: my-webapp
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 80
    nodePort: 30007
  type: NodePort
