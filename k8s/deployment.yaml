# deployment.yaml
# Author: Lucas Mohler
# Purpose: Kubernetes Deployment manifest for the SWE 645 web application.
#          Maintains 3 replicas of the nginx container for high availability and
#          automatically replaces any pods that fail or are deleted.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-webapp
  template:
    metadata:
      labels:
        app: my-webapp
    spec:
      containers:
      - name: my-webapp
        image: lmohler/my-webapp:latest
        ports:
        - containerPort: 80

